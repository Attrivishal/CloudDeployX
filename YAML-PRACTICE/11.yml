name : Test Workflow

on : 
  push :
    branches : 
         - main

jobs :
  test :
    runs-on : ubuntu-latest
    steps :
      - name : checkout code
        uses : actions/checkout@v2

      - name : "Setup Node.Js 18"
        uses : actions/setup@v2
        with : 
          node-version : "18"
      
      - name : "Install dependencies"
        run : npm install
      
      - name : "run tests"
        run : npm test 