name : Practice-YAML

on :
  push :
    branches :
      - main 
  workflow_dispatch :

env :
  APP_NAME : "MyApp"
  NODE_ENV : "Production"


jobs : 
  build :
    runs-on : ubuntu-latest 
    steps :
      - name : checkout-code 
        uses : actions/checkout@v4
      - name : Build started 
        run : echo "Build started"

  test :
    runs-on : ubuntu-latest
    needs : build 
    strategy :
      matrix :
        node-version : [18,20]
    
    steps : 
      - name : checkout code
        uses : actions/checkout@v4
      
      - name : setup Node.Js 
        uses : actions/setup-node@v4
        with : 
          node-version : ${{matrix.node-version}}

      - name : print node version
        run : node --version

      - name : conditional step for node 20
        if: matrix.node-version ==  20
        run : echo "Running Node 20 specific checks "
      
      - name : print environment variables
        run : |
          echo  "APP_NAME" : ${{env.APP_NAME}}
          echo "NODE_ENV" : ${{env.NODE_ENV}} 


