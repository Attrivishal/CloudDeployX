name : Practice-YAML

on : 
  push : 
    branches : 
      - main
  pull_request :
    branches : 
      - main

jobs : 
  build : 
      runs-on : ubuntu-latest
      steps : 
        - name : checkout code
          uses : actions/checkout@v2

        - name : "Install dependencies"
          run : npm install
          working-directory : backend
        
        - name : "Run tests"
          run : npm test
          working-directory : backend
          
      