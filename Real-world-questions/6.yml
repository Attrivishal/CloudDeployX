name : Practice-YAML

on : 
  push : 
    branches :
      - main
  pull_request :
    branches :
      - main

jobs :
 build :
    runs-on : ubuntu-latest
    steps : 
     - name : checkout code 
       uses : actions/checkout@v2
     - name : "Setup Node.JS version 20"
       uses : actions/setup-node@v4   
       with : 
        node-version : "20"
     - name : "Clean Install"
       run : npm ci
     - name : "Build Project"
       run : npm run build
  
 test : 
     runs-on : ubuntu-latest
     needs : build
     steps: 
      - name : checkout code
        uses : actions/checkout@v2
      - name : "Setup Node.JS version 20"
        uses : actions/setup-node@v4   
        with : 
          node-version : "20"
      - name : "Clean Install"
        run : npm ci
      - name : "Run tests"
        run : npm test
      - name : " Run Lint"
        run : npm run lint 
  
deploy :
    runs-on : ubuntu-latest
    needs : test
    if : github.event_name == 'push'
    steps :
      - name : checkout code
        uses : actions/checkout@v2
      - name : "Deploy to production"
        run : echo "Deploying to production environment"
      