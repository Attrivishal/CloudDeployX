name : checking Prs check befor merging

on : 
  pull_request: 
  branches :
    - main
    - develop 
  
jobs :
  lint :
    runs-on : ubuntu-latest
    steps :
      - name : checkout code 
        uses : actions/checkout@v4

      - name : setup node
        uses : actions/setup-node@v4
        with :
          node-version : "18"

      - name : install dependencies 
        run : npm ci

      - name : run ESlint
        run : npx eslint
  
  test : 
    runs-on : ubuntu-latest 
    needs : lint
    strategy :
      matrix :
        node-version : [18,20]
    
    steps :
      - name : checkout code
        uses : actions/checkout@v4

      - name : setup node
        uses : actions/setup-node@v4
        with : 
          node-version : ${{matrix.node-version}}
        
      - name : install dependencies
        run : npm ci  
      
      - name : run tests
        run : npm test
      
      - name : upload coverage report 
        uses : actions/upload-artifact@v4
        with : 
          name : coverage-report-node-${{ matrix.node-version }}
          path : coverage/
          

  build :
    runs-on : ubuntu-latest
    needs : test
    steps :
      - name : checkout code 
        uses : actions/checkout@v4
      
      - name : setup node
        uses : actions/setup-node@v4
        with : 
          node-version : "18"

      - name : install dependencies 
        run : npm ci

      - name : run build 
        run : npm run build 